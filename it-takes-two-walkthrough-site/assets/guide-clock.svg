<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">布谷鸟钟通关图解</title>
  <desc id="desc">展示布谷鸟钟章节中 Cody 时间控制、May 分身传送和公牛 Boss 的通关顺序。</desc>
  <style>
    .bg{fill:#eef4fb}.panel{fill:#fffdf7;stroke:#2d4152;stroke-width:4}.clock{fill:#e6d4a6;stroke:#50351f;stroke-width:7}.blue{fill:#2466ad}.coral{fill:#e95d48}.teal{fill:#0f766e}.dark{fill:#18212b}.note{fill:#18212b;font-family:"Microsoft YaHei",Arial,sans-serif;font-weight:800}.small{font-size:24px}.mid{font-size:30px}.big{font-size:42px}.tag{fill:#ffffff;font-family:"Microsoft YaHei",Arial,sans-serif;font-weight:900;font-size:26px}.line{stroke:#18212b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round;fill:none;marker-end:url(#arrow)}
  </style>
  <defs><marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#18212b"/></marker></defs>
  <rect class="bg" width="960" height="540"/>
  <rect class="panel" x="42" y="40" width="876" height="460" rx="24"/>
  <text class="note big" x="82" y="98">04 布谷鸟钟：May 留分身，Cody 调时间</text>
  <circle class="clock" cx="480" cy="278" r="135"/>
  <path d="M480 278 L480 182" stroke="#18212b" stroke-width="9" stroke-linecap="round"/>
  <path d="M480 278 L555 320" stroke="#18212b" stroke-width="7" stroke-linecap="round"/>
  <circle class="dark" cx="480" cy="278" r="12"/>
  <rect class="blue" x="96" y="150" width="240" height="94" rx="18"/>
  <text class="tag" x="128" y="188">Cody 时间</text><text class="tag" x="126" y="221">还原平台和按钮</text>
  <rect class="coral" x="624" y="150" width="240" height="94" rx="18"/>
  <text class="tag" x="660" y="188">May 分身</text><text class="tag" x="650" y="221">留点后瞬移</text>
  <path class="line" d="M338 196 C385 206 417 228 443 252"/>
  <path class="line" d="M622 196 C574 207 541 229 515 253"/>
  <rect class="teal" x="124" y="350" width="206" height="78" rx="16"/>
  <text class="tag" x="161" y="382">塔楼机关</text><text class="tag" x="151" y="413">一人报节奏</text>
  <rect class="coral" x="630" y="350" width="206" height="78" rx="16"/>
  <text class="tag" x="669" y="382">公牛 Boss</text><text class="tag" x="655" y="413">冲撞前瞬移</text>
  <path class="line" d="M330 388 C390 420 560 420 625 388"/>
  <text class="note small" x="92" y="464">口令：May 留影，Cody 倒时，三二一同步过门。</text>
</svg>
