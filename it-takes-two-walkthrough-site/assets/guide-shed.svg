<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">工具棚通关图解</title>
  <desc id="desc">展示工具棚章节中吸尘器、钉子锤子机关和工具箱 Boss 的通关顺序。</desc>
  <style>
    .bg{fill:#fff7e6}.panel{fill:#ffffff;stroke:#3b2f23;stroke-width:4}.track{fill:#d7e7e4;stroke:#276761;stroke-width:4}.wood{fill:#b87542;stroke:#6d3e24;stroke-width:4}.steel{fill:#c7d0d6;stroke:#34495e;stroke-width:4}.danger{fill:#e95d48}.safe{fill:#0f766e}.note{fill:#18212b;font-family:"Microsoft YaHei",Arial,sans-serif;font-weight:800}.small{font-size:24px}.mid{font-size:30px}.big{font-size:42px}.label{fill:#ffffff;font-family:"Microsoft YaHei",Arial,sans-serif;font-weight:900;font-size:28px}.arrow{stroke:#18212b;stroke-width:7;stroke-linecap:round;stroke-linejoin:round;fill:none;marker-end:url(#arrow)}
  </style>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#18212b"/></marker>
  </defs>
  <rect class="bg" width="960" height="540"/>
  <rect class="panel" x="42" y="40" width="876" height="460" rx="24"/>
  <text class="note big" x="82" y="98">01 工具棚：先造落脚点，再打弱点</text>
  <rect class="track" x="90" y="146" width="235" height="78" rx="16"/>
  <circle class="safe" cx="135" cy="185" r="28"/><text class="label" x="127" y="195">1</text>
  <text class="note mid" x="176" y="179">吸尘器</text>
  <text class="note small" x="176" y="210">一人吸弹，一人瞄脸</text>
  <rect class="wood" x="364" y="144" width="238" height="84" rx="14"/>
  <circle class="safe" cx="410" cy="186" r="28"/><text class="label" x="401" y="196">2</text>
  <text class="note mid" x="452" y="180">钉子 + 锤子</text>
  <text class="note small" x="452" y="211">钉住平台，锤子再跳</text>
  <rect class="steel" x="644" y="137" width="220" height="98" rx="16"/>
  <circle class="danger" cx="690" cy="186" r="28"/><text class="label" x="681" y="196">3</text>
  <text class="note mid" x="733" y="178">工具箱</text>
  <text class="note small" x="733" y="211">钉手臂，敲锁扣</text>
  <path class="arrow" d="M326 186 H360"/>
  <path class="arrow" d="M604 186 H640"/>
  <path class="arrow" d="M190 304 C250 265 330 260 392 303"/>
  <path class="arrow" d="M474 304 C550 255 685 256 756 304"/>
  <rect class="danger" x="125" y="330" width="170" height="88" rx="16"/>
  <text class="label" x="158" y="366">风扇区</text>
  <text class="label" x="149" y="399">红钮反转</text>
  <rect class="safe" x="390" y="330" width="180" height="88" rx="16"/>
  <text class="label" x="422" y="367">锁扣区</text>
  <text class="label" x="414" y="400">等破绽</text>
  <rect class="danger" x="668" y="330" width="170" height="88" rx="16"/>
  <text class="label" x="702" y="367">收尾区</text>
  <text class="label" x="691" y="400">打炸罐</text>
  <text class="note small" x="92" y="464">口令：站好，先钉，再跳，手落下再输出。</text>
</svg>
